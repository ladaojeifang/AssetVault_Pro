name: CI

on:
  push:
    branches: [master, main]
    paths-ignore:
      - 'doc-internal/**'
      - 'doc-internal.template/**'
      - '*.md'
  pull_request:
    paths-ignore:
      - 'doc-internal/**'
      - 'doc-internal.template/**'
      - '*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── L0: Static Checks (lint / typecheck / i18n) ─────────────────────
  static-checks:
    name: Lint & Typecheck & i18n
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run i18n:check

  # ─── L1: Unit Tests + OpenAPI Contract Check ────────────────────────
  unit-tests:
    name: Unit Tests & OpenAPI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:ci

  # ─── Build Verification ─────────────────────────────────────────────
  build:
    name: Build (electron-vite)
    runs-on: ubuntu-latest
    needs: [static-checks, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - name: Verify build output
        run: |
          test -f out/main/index.js || (echo "ERROR: out/main/index.js missing" && exit 1)
          test -f out/preload/index.js || (echo "ERROR: out/preload/index.js missing" && exit 1)
          test -d out/renderer || (echo "ERROR: out/renderer/ missing" && exit 1)
          echo "Build output looks good"
      - uses: actions/upload-artifact@v4
        with:
          name: build-out
          path: out/
          retention-days: 1

  # ─── L2: Integration Tests (Electron Node + SQLite) ─────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install Electron system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 \
            xdg-utils libatspi2.0-0 libdrm2 libgbm1 \
            libasound2t64 libxkbcommon0
      - run: pnpm install --frozen-lockfile
      - name: Run integration tests (Electron Node)
        run: pnpm run test:integration
        continue-on-error: true

  # ─── Push Safety Check (mirror .githooks/pre-push) ──────────────────
  push-safety:
    name: Push Safety Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run push-safety check
        if: github.event_name == 'push'
        run: node scripts/verify-push-safe.mjs
