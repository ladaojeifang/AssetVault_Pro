<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AssetVault Pro API Playground</title>
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui.css" />
    <style>
      html {
        box-sizing: border-box;
        overflow-y: scroll;
      }
      *,
      *::before,
      *::after {
        box-sizing: inherit;
      }
      body {
        margin: 0;
        background: #0f1419;
      }
      .topbar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 16px;
        background: #1a2332;
        border-bottom: 1px solid #2d3a4d;
        font-family: system-ui, sans-serif;
        font-size: 13px;
        color: #c8d4e0;
      }
      .topbar strong {
        color: #fff;
      }
      .topbar a {
        color: #60a5fa;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <strong>AssetVault Pro</strong>
      <span>Web API v1</span>
      <a id="openapi-link" href="../docs/openapi.yaml" target="_blank" rel="noopener">openapi.yaml</a>
      <span id="lang-hint" style="margin-left: auto; opacity: 0.75"></span>
    </div>
    <div id="swagger-ui"></div>
    <script src="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui-bundle.js" crossorigin></script>
    <script src="https://unpkg.com/swagger-ui-dist@5.18.2/swagger-ui-standalone-preset.js" crossorigin></script>
    <script>
      window.onload = function () {
        const params = new URLSearchParams(window.location.search)
        const navEn = typeof navigator !== 'undefined' && navigator.language && navigator.language.startsWith('en')
        const langParam = params.get('lang')
        const useEn = langParam === 'en' || (langParam !== 'zh' && navEn)
        const specFile = useEn ? 'openapi.en.yaml' : 'openapi.yaml'
        document.documentElement.lang = useEn ? 'en' : 'zh-CN'
        document.getElementById('openapi-link').href = new URL('../docs/' + specFile, window.location.href).href
        document.getElementById('openapi-link').textContent = specFile
        document.getElementById('lang-hint').textContent = useEn
          ? 'Documentation language: English'
          : '文档语言：简体中文'
        const specUrl = new URL('../docs/' + specFile, window.location.href).href
        window.ui = SwaggerUIBundle({
          url: specUrl,
          dom_id: '#swagger-ui',
          deepLinking: true,
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          layout: 'StandaloneLayout',
          tryItOutEnabled: true,
          persistAuthorization: true
        })
      }
    </script>
  </body>
</html>
